services:
  - type: web
    name: jitouradar-api
    runtime: python
    rootDir: .
    plan: free
    buildCommand: pip install -r apps/api/requirements.txt
    startCommand: uvicorn apps.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MARKET_DATA_PROVIDER_ORDER
        value: eastmoney,akshare,sample
